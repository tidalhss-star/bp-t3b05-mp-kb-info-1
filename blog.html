  <style>
    /* ===== CSS 리셋 & 기본 ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html {
      font-size: 16px;
      scroll-behavior: smooth;
    }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      line-height: 1.5;
    }

    /* ===== DENSE SPACE ===== */
    :root {
      --accent: #FFE600;
      --accent-dark: #CCB800;
      --bg-dark: #111;
      --bg-card: #1a1a1a;
      --border-thick: 6px;
      --border-med: 3px;
      --font-title: 'Helvetica Neue', sans-serif;
      --space-unit: 1.2rem;
    }

    /* ===== GLOBAL ===== */
    a {
      color: var(--accent);
      text-decoration: none;
      transition: 0.2s;
    }
    a:hover {
      color: #fff;
      background: var(--accent);
      color: #000;
      padding: 0 0.2em;
    }
    h1, h2, h3, h4 {
      font-family: var(--font-title);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.03em;
    }
    h1 {
      font-size: 3.2rem;
      line-height: 1;
      color: var(--accent);
      border-left: var(--border-thick) solid var(--accent);
      padding-left: 0.6rem;
      margin-bottom: 1rem;
    }
    h2 {
      font-size: 2rem;
      color: #fff;
      border-bottom: var(--border-med) solid var(--accent);
      padding-bottom: 0.3rem;
      margin: 2rem 0 1rem;
    }
    h3 {
      font-size: 1.4rem;
      color: var(--accent);
      margin: 1.5rem 0 0.5rem;
    }
    p {
      margin-bottom: 1rem;
      font-size: 1.1rem;
    }
    img, svg {
      max-width: 100%;
      height: auto;
      display: block;
    }

    /* ===== LAYOUT ===== */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }
    .full-bleed {
      width: 100vw;
      position: relative;
      left: 50%;
      right: 50%;
      margin-left: -50vw;
      margin-right: -50vw;
      background: var(--bg-dark);
      padding: 2rem 1.5rem;
    }
    .full-bleed .inner {
      max-width: 1100px;
      margin: 0 auto;
    }
    .card {
      background: var(--bg-card);
      border: var(--border-med) solid var(--accent);
      padding: 1.5rem;
      margin: 1.5rem 0;
      box-shadow: 8px 8px 0 rgba(255, 230, 0, 0.15);
      transition: 0.2s;
    }
    .card:hover {
      transform: translate(-2px, -2px);
      box-shadow: 12px 12px 0 rgba(255, 230, 0, 0.3);
    }

    /* 네비게이션 */
    nav.nav-present {
      background: #000;
      border-bottom: var(--border-med) solid var(--accent);
      padding: 1rem 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    nav.nav-present .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    nav .logo {
      font-weight: 900;
      font-size: 1.8rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: -0.05em;
    }
    nav .logo a {
      color: var(--accent);
    }
    nav .logo a:hover {
      background: none;
      color: var(--accent);
      padding: 0;
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 1.8rem;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 0.9rem;
    }
    nav ul li a {
      color: #ccc;
      padding: 0.3rem 0;
      border-bottom: 2px solid transparent;
    }
    nav ul li a:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
      background: none;
      padding: 0.3rem 0;
    }
    .hamburger-menu {
      display: none;
      cursor: pointer;
      flex-direction: column;
      gap: 5px;
    }
    .hamburger-menu span {
      display: block;
      width: 30px;
      height: 4px;
      background: var(--accent);
      border-radius: 2px;
    }
    @media (max-width: 768px) {
      nav ul {
        display: none;
        flex-direction: column;
        background: #000;
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        padding: 1rem;
        border-bottom: var(--border-med) solid var(--accent);
      }
      nav ul.open {
        display: flex;
      }
      .hamburger-menu {
        display: flex;
      }
      .tel-link-mobile {
        display: inline-block;
        background: var(--accent);
        color: #000;
        font-weight: bold;
        padding: 0.5rem 1rem;
        border-radius: 0;
        margin-top: 1rem;
        text-align: center;
      }
    }
    .tel-link {
      font-weight: bold;
      font-size: 1.1rem;
      background: var(--accent);
      color: #000;
      padding: 0.3rem 0.8rem;
      border: none;
      cursor: pointer;
    }
    .tel-link:hover {
      background: #fff;
      color: #000;
    }

    /* 푸터 */
    footer {
      border-top: var(--border-med) solid var(--accent);
      padding: 2rem 0;
      margin-top: 3rem;
      text-align: center;
    }
    footer p {
      margin-bottom: 0.5rem;
    }
    footer .tel-big {
      font-size: 2rem;
      font-weight: 900;
      color: var(--accent);
      display: inline-block;
      border: var(--border-med) solid var(--accent);
      padding: 0.3rem 1.5rem;
      margin: 1rem 0;
    }
  </style>
</head>
<body>

<!-- 네비게이션 -->
<nav class="nav-present">
  <div class="container">
    <div class="logo">
      <a href="/">노래방 형님들</a>
    </div>
    <div class="hamburger-menu" onclick="document.querySelector('nav ul').classList.toggle('open')">
</body>
</html>
